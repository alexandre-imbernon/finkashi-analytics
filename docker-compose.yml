services:
  # ---------------------------------------------------------------
  # Service applicatif PHP 8.3 (notre back-end Finkashi Analytics).
  # ---------------------------------------------------------------
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: finkashi_php
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: finkashi_analytics
      DB_USER: finkashi
      DB_PASSWORD: finkashi_dev
      APP_API_KEY: ${APP_API_KEY}
      APP_SEL_SECRET: ${APP_SEL_SECRET}
      APP_DOMAINE: ${APP_DOMAINE:-finkashi.fr}
      APP_ORIGINES_DEV: ${APP_ORIGINES_DEV:-}
    networks:
      - finkashi_net

  mysql:
    image: mysql:8.0
    container_name: finkashi_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: finkashi_analytics
      MYSQL_USER: finkashi
      MYSQL_PASSWORD: finkashi_dev
    ports:
      - "3306:3306"
    volumes:
      - finkashi_db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finkashi_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: finkashi_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - finkashi_net

  # ---------------------------------------------------------------
  # WordPress : environnement de developpement du plugin.
  # Le plugin lui-meme est monte depuis ./wordpress-plugin/, ce qui
  # permet de le modifier en temps reel depuis le poste.
  # ---------------------------------------------------------------
  wordpress:
    image: wordpress:6.7-php8.3-apache
    container_name: finkashi_wordpress
    ports:
      - "8090:80"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: finkashi
      WORDPRESS_DB_PASSWORD: finkashi_dev
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
    volumes:
      - finkashi_wp_data:/var/www/html
      - ./wordpress-plugin/finkashi-analytics:/var/www/html/wp-content/plugins/finkashi-analytics
    networks:
      - finkashi_net

volumes:
  finkashi_db_data:
  finkashi_wp_data:

networks:
  finkashi_net:
    driver: bridge
