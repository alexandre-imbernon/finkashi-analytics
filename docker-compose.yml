services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: finkashi_php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: finkashi_analytics
      DB_USER: finkashi
      DB_PASSWORD: finkashi_dev
      APP_API_KEY: ${APP_API_KEY}
      APP_SEL_SECRET: ${APP_SEL_SECRET}
      APP_DOMAINE: ${APP_DOMAINE:-finkashi.fr}
      APP_ORIGINES_DEV: ${APP_ORIGINES_DEV:-}
      # Backend de stockage des metadonnees d'archives.
      # 'mysql' (defaut) ou 'mongo'.
      APP_ARCHIVE_STORE: ${APP_ARCHIVE_STORE:-mysql}
      APP_MONGO_URI: ${APP_MONGO_URI:-mongodb://mongo:27017}
      APP_MONGO_BASE: ${APP_MONGO_BASE:-finkashi_analytics}
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - finkashi_net

  mysql:
    image: mysql:8.0
    container_name: finkashi_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: finkashi_analytics
      MYSQL_USER: finkashi
      MYSQL_PASSWORD: finkashi_dev
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finkashi_net

  phpmyadmin:
    image: phpmyadmin:5
    container_name: finkashi_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: finkashi
      PMA_PASSWORD: finkashi_dev
    depends_on:
      - mysql
    networks:
      - finkashi_net

  wordpress:
    image: wordpress:6.7
    container_name: finkashi_wp
    ports:
      - "8090:80"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: finkashi
      WORDPRESS_DB_PASSWORD: finkashi_dev
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./wordpress-plugin/finkashi-analytics:/var/www/html/wp-content/plugins/finkashi-analytics
    depends_on:
      - mysql
    networks:
      - finkashi_net

  # ----- Nouveaute branche NoSQL : MongoDB pour la persistance des archives ----

  mongo:
    image: mongo:4.4
    container_name: finkashi_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - finkashi_net

  # Interface d'administration MongoDB (equivalent de phpMyAdmin pour Mongo).
  mongo-express:
    image: mongo-express:0.54
    container_name: finkashi_mongo_express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: ""
      ME_CONFIG_BASICAUTH_PASSWORD: ""
    depends_on:
      - mongo
    networks:
      - finkashi_net

volumes:
  mysql_data:
  wp_data:
  mongo_data:

networks:
  finkashi_net:
    driver: bridge
